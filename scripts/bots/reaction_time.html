<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            font-size: 3rem;
            color: white;
            background-color: #2b87d1; /* Blue start screen */
            cursor: pointer;
            user-select: none;
        }
    </style>
</head>
<body id="box" onclick="handleClick()">
    <div id="message">Click to start</div>

    <script>
        let state = 'waiting'; // waiting, ready, active
        let startTime;
        let timeoutId;
        const box = document.getElementById('box');
        const message = document.getElementById('message');

        function handleClick() {
            if (state === 'waiting') {
                state = 'ready';
                box.style.backgroundColor = '#ce2636'; // Red
                message.innerText = 'Wait for green...';
                
                // Random delay between 1 and 4 seconds
                const delay = Math.floor(Math.random() * 3000) + 1000;
                timeoutId = setTimeout(() => {
                    state = 'active';
                    box.style.backgroundColor = '#4bdb6a'; // Green
                    message.innerText = 'CLICK!';
                    startTime = performance.now(); // High precision timer
                }, delay);

            } else if (state === 'ready') {
                clearTimeout(timeoutId);
                state = 'waiting';
                box.style.backgroundColor = '#2b87d1';
                message.innerText = 'Too soon! Click to try again.';

            } else if (state === 'active') {
                const reactionTime = Math.round(performance.now() - startTime);
                state = 'waiting';
                box.style.backgroundColor = '#2b87d1';
                message.innerText = `Time: ${reactionTime} ms\nClick to go again`;
            }
        }
    </script>
</body>
</html>
